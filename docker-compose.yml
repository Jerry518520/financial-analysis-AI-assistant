services:
  backend:
    build: .
    container_name: financial_report_backend
    ports:
      - "8000:8000"
    volumes:
      # 挂载缓存目录，确保重启后缓存不丢失
      - ./cache_data:/app/cache_data
      - ./faiss_index:/app/faiss_index
      # 开发模式下可以挂载源代码，实现热重载 (可选)
      # - ./src:/app/src
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - LLAMA_CLOUD_API_KEY=${LLAMA_CLOUD_API_KEY}
      # HuggingFace 镜像源（解决网络访问问题）
      - HF_ENDPOINT=https://hf-mirror.com
      # FAISS 索引路径（必须与 volume 挂载点一致）
      - FAISS_INDEX_PATH=/app/faiss_index
      # 如果有其他环境变量，继续添加
    # 添加 GPU 支持
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: uvicorn financial_report_ai_assistant.api.main:app --host 0.0.0.0 --port 8000
    # 健康检查：frontend 会等 backend healthy 后才启动
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: financial_report_frontend
    ports:
      - "8501:8501"
    environment:
      # API_URL 是 Streamlit 服务端（Python 进程）调用 backend 用的
      # backend 也在 Docker 容器中，必须用 Docker 内部网络域名 http://backend:8000
      # 不要用 host.docker.internal（那是访问宿主机用的）
      - API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    command: streamlit run frontend/main.py --server.address 0.0.0.0 --server.port 8501
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
